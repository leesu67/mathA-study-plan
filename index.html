<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>數學A 大滿貫讀書計畫 (李向宇老師製作)</title>
    <style>
        :root {
            --primary: #2563eb;
            --success: #10b981;
            --bg: #f8fafc;
            --card: #ffffff;
            --text: #1e293b;
            --border: #e2e8f0;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: "Microsoft JhengHei", "Noto Sans TC", sans-serif;
            background: var(--bg);
            color: var(--text);
            line-height: 1.6;
            padding: 20px;
        }
        header {
            max-width: 1200px;
            margin: 0 auto 20px;
            background: white;
            padding: 20px;
            border-radius: 12px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.05);
            position: sticky;
            top: 10px;
            z-index: 100;
        }
        h1 { font-size: 1.5rem; color: var(--primary); margin-bottom: 10px; text-align: center; }
        .progress-bar {
            width: 100%;
            height: 12px;
            background: #e2e8f0;
            border-radius: 6px;
            overflow: hidden;
            margin: 15px 0;
        }
        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, var(--primary), var(--success));
            width: 0%;
            transition: width 0.4s ease;
        }
        .controls {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            justify-content: center;
            margin-top: 15px;
        }
        button {
            padding: 10px 15px;
            border: none;
            border-radius: 8px;
            font-weight: bold;
            cursor: pointer;
            transition: transform 0.1s, opacity 0.2s;
            font-size: 0.85rem;
        }
        button:active { transform: scale(0.95); }
        .btn-excel { background: #10b981; color: white; }
        .btn-word { background: #2563eb; color: white; }
        .btn-pdf { background: #64748b; color: white; }
        .btn-reset { background: #ef4444; color: white; }
        .btn-backup { background: #8b5cf6; color: white; }
        .btn-restore { background: #ec4899; color: white; }

        .container { max-width: 1200px; margin: 0 auto; }
        
        table {
            width: 100%;
            border-collapse: collapse;
            background: white;
            border-radius: 12px;
            overflow: hidden;
            box-shadow: 0 4px 6px rgba(0,0,0,0.05);
            margin-bottom: 30px;
        }
        th, td {
            padding: 12px 15px;
            text-align: left;
            border-bottom: 1px solid var(--border);
            font-size: 0.95rem;
        }
        th {
            background: #f1f5f9;
            font-weight: bold;
            color: #475569;
            position: sticky;
            top: 0;
        }
        .phase-header {
            background: #eff6ff;
            color: var(--primary);
            font-weight: bold;
            font-size: 1.1rem;
            text-align: center;
        }
        .unit-cell { font-weight: bold; color: #0f172a; background: #f8fafc; }
        .concept-cell { color: #334155; }
        .goal-cell { color: #64748b; font-size: 0.85rem; }
        
        .check-wrapper { text-align: center; }
        .check-wrapper input { width: 22px; height: 22px; cursor: pointer; accent-color: var(--success); }
        
        tr.done { background-color: #f0fdf4; }
        tr.done td { color: #94a3b8; text-decoration: line-through; }
        tr.done .check-wrapper input { accent-color: #94a3b8; }

        /* 手機版響應式 */
        @media (max-width: 768px) {
            body { padding: 10px; }
            header { position: relative; top: 0; padding: 15px; }
            h1 { font-size: 1.2rem; }
            button { padding: 10px 12px; font-size: 0.8rem; flex: 1 1 45%; }
            table, thead, tbody, th, td, tr { display: block; }
            thead tr { position: absolute; top: -9999px; left: -9999px; }
            tr { 
                border: 1px solid #ccc; 
                border-radius: 8px; 
                margin-bottom: 15px; 
                padding: 10px;
                background: white;
                position: relative;
            }
            td { 
                border: none; 
                position: relative; 
                padding-left: 35%; 
                text-align: right;
            }
            td:before { 
                position: absolute; 
                left: 10px; 
                width: 30%; 
                white-space: nowrap;
                font-weight: bold;
                text-align: left;
                color: #475569;
            }
            td:nth-of-type(1):before { content: "階段/日期"; }
            td:nth-of-type(2):before { content: "單元"; }
            td:nth-of-type(3):before { content: "概念名稱"; }
            td:nth-of-type(4):before { content: "學習重點"; }
            td:nth-of-type(5) { 
                position: absolute; 
                top: 15px; 
                right: 15px; 
                width: auto; 
                padding: 0; 
            }
            td:nth-of-type(5):before { display: none; }
            .phase-header { padding: 10px; text-align: left; border-radius: 8px; margin-bottom: 10px; }
            .phase-header td { padding-left: 10px; text-align: left; }
            .phase-header td:before { display: none; }
        }

        /* 列印樣式 */
        @media print {
            header, .controls, .btn-reset { display: none !important; }
            body { background: white; padding: 0; }
            table { box-shadow: none; font-size: 12px; }
            th, td { padding: 8px; border: 1px solid #ccc; }
            tr.done { background-color: white !important; -webkit-print-color-adjust: exact; }
            .check-wrapper input { display: none; }
            .check-wrapper:after { content: "☐"; font-size: 16px; }
            tr.done .check-wrapper:after { content: "☑"; }
        }
    </style>
</head>
<body>

<header>
    <h1>📘 數學A 大滿貫讀書計畫 (李向宇老師製作)</h1>
    <p style="text-align:center; color:#64748b; font-size:0.9rem;">配合翰林全國模考日程 ｜ 單元1-14嚴格依序排列 ｜ 進度自動儲存</p>
    <div class="progress-bar"><div class="progress-fill" id="progressFill"></div></div>
    <p style="text-align:center; font-weight:bold; color:var(--primary);" id="progressText">已完成 0%</p>
    <div class="controls">
        <button class="btn-backup" onclick="exportProgressCode()">💾 備份進度碼</button>
        <button class="btn-restore" onclick="importProgressCode()">📥 還原進度碼</button>
        <button class="btn-excel" onclick="exportExcel()">📊 匯出 Excel</button>
        <button class="btn-word" onclick="exportWord()">📝 匯出 Word</button>
        <button class="btn-pdf" onclick="window.print()">🖨️ 列印 / PDF</button>
        <button class="btn-reset" onclick="resetProgress()">🔄 重置進度</button>
    </div>
</header>

<div class="container">

</div>

    // 渲染表格
    function renderTable() {
        const tbody = document.getElementById('tableBody');
        let html = '';
        let totalTasks = 0;
        let taskId = 0;

        planData.forEach(phase => {
            html += `<tr class="phase-header"><td colspan="5">${phase.phase}</td></tr>`;
            phase.units.forEach(unit => {
                unit.concepts.forEach((concept, index) => {
                    taskId++;
                    totalTasks++;
                    const rowSpan = index === 0 ? `rowspan="${unit.concepts.length}"` : '';
                    const unitCell = index === 0 ? `<td class="unit-cell" ${rowSpan}><strong>${unit.unit}</strong><br><span style="font-size:0.85em;color:#2563eb;">${unit.date}</span></td>` : '';
                    
                    html += `
                        <tr id="row_${taskId}">
                            ${unitCell}
                            <td class="concept-cell">${concept.name}</td>
                            <td class="goal-cell">${concept.goal}</td>
                            <td class="check-wrapper">
                                <input type="checkbox" id="check_${taskId}" onchange="saveProgress()">
                            </td>
                        </tr>
                    `;
                });
            });
        });
        tbody.innerHTML = html;
        window.totalTasks = totalTasks;
        loadProgress();
    }

    // 儲存進度
    function saveProgress() {
        const progress = {};
        let completed = 0;
        for (let i = 1; i <= window.totalTasks; i++) {
            const cb = document.getElementById(`check_${i}`);
            const row = document.getElementById(`row_${i}`);
            if (cb.checked) {
                progress[i] = true;
                row.classList.add('done');
                completed++;
            } else {
                progress[i] = false;
                row.classList.remove('done');
            }
        }
        localStorage.setItem('mathPlanProgress_HanlinVersion', JSON.stringify(progress));
        updateProgressUI(completed);
    }

    // 讀取進度
    function loadProgress() {
        const saved = localStorage.getItem('mathPlanProgress_HanlinVersion');
        let completed = 0;
        if (saved) {
            const progress = JSON.parse(saved);
            for (let i = 1; i <= window.totalTasks; i++) {
                const cb = document.getElementById(`check_${i}`);
                const row = document.getElementById(`row_${i}`);
                if (progress[i]) {
                    cb.checked = true;
                    row.classList.add('done');
                    completed++;
                }
            }
        }
        updateProgressUI(completed);
    }

    function updateProgressUI(completed) {
        const percent = Math.round((completed / window.totalTasks) * 100);
        document.getElementById('progressFill').style.width = percent + '%';
        document.getElementById('progressText').innerText = `已完成 ${percent}% (${completed} / ${window.totalTasks} 個概念)`;
    }

    function resetProgress() {
        if (confirm("確定要清除所有打勾紀錄嗎？此動作無法復原！")) {
            localStorage.removeItem('mathPlanProgress_HanlinVersion');
            location.reload();
        }
    }

    // 🌟 終極功能：備份進度碼
    function exportProgressCode() {
        let binaryStr = '';
        for (let i = 1; i <= window.totalTasks; i++) {
            const cb = document.getElementById(`check_${i}`);
            binaryStr += cb.checked ? '1' : '0';
        }
        const code = btoa(binaryStr);
        prompt("✅ 請複製以下「進度備份碼」，並貼到手機備忘錄保存：", code);
    }

    // 🌟 終極功能：還原進度碼
    function importProgressCode() {
        const code = prompt("請貼上您的「進度備份碼」：");
        if (!code) return;
        try {
            const binaryStr = atob(code);
            if (binaryStr.length !== window.totalTasks) {
                alert("️ 備份碼長度不符，請確認是否為對應版本的進度碼！");
                return;
            }
            for (let i = 1; i <= window.totalTasks; i++) {
                const cb = document.getElementById(`check_${i}`);
                const row = document.getElementById(`row_${i}`);
                if (binaryStr[i - 1] === '1') {
                    cb.checked = true;
                    row.classList.add('done');
                } else {
                    cb.checked = false;
                    row.classList.remove('done');
                }
            }
            saveProgress();
            alert("🎉 進度還原成功！");
        } catch (e) {
            alert("❌ 備份碼格式錯誤，請重新複製！");
        }
    }

    // 匯出 Excel (CSV)
    function exportExcel() {
        let csvData = '\uFEFF階段,單元,日期,概念名稱,學習重點,完成\n';
        let idx = 1;
        planData.forEach(phase => {
            phase.units.forEach(unit => {
                unit.concepts.forEach(concept => {
                    const isChecked = document.getElementById(`check_${idx}`).checked ? 'V' : '';
                    csvData += `"${phase.phase}","${unit.unit}","${unit.date}","${concept.name}","${concept.goal}","${isChecked}"\n`;
                    idx++;
                });
            });
        });

        const blob = new Blob([csvData], { type: 'text/csv;charset=utf-8;' });
        const link = document.createElement('a');
        link.href = URL.createObjectURL(blob);
        link.download = '數學A大滿貫讀書計畫_李向宇老師製作(翰林版).csv';
        link.click();
    }

    // 匯出 Word (DOC)
    function exportWord() {
        let tableHtml = document.getElementById('planTable').outerHTML;
        tableHtml = tableHtml.replace(/<input type="checkbox"[^>]*>/g, '');
        let html = `
            <html xmlns:o="urn:schemas-microsoft-com:office:office"
                  xmlns:w="urn:schemas-microsoft-com:office:word"
                  xmlns="http://www.w3.org/TR/REC-html40">
            <head><meta charset="utf-8"><title>讀書計畫</title>
            <style>
                body { font-family: 'Microsoft JhengHei'; }
                table { width: 100%; border-collapse: collapse; }
                th, td { border: 1px solid black; padding: 8px; font-size: 12pt; }
                th { background-color: #f2f2f2; }
                .phase-header { background-color: #e6f2ff; font-weight: bold; text-align: center; }
                .done { text-decoration: line-through; color: gray; }
            </style>
            </head>
            <body>
                <h1 style="text-align:center;">高中數學A 大滿貫讀書計畫表 - 李向宇老師製作</h1>
                <p style="text-align:center;">配合翰林全國模考日程 | 期間：2026/06/15 - 2026/12/08 | 涵蓋 14 單元</p>
                ${tableHtml}
            </body>
            </html>
        `;
        
        const blob = new Blob(['\ufeff', html], { type: 'application/msword' });
        const link = document.createElement('a');
        link.href = URL.createObjectURL(blob);
        link.download = '數學A大滿貫讀書計畫_李向宇老師製作(翰林版).doc';
        link.click();
    }

    // 初始化
    document.addEventListener('DOMContentLoaded', renderTable);
</script>
</body>
